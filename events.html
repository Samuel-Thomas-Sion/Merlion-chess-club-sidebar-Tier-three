<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merlion Chess Club - Active Events</title>
</head>
<body style="background: #1b1c1e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: Arial, sans-serif;">

  <!-- ACTIVE EVENT GRID WIDGET -->
  <div style="width: 270px; background: linear-gradient(145deg,#141820,#10151f); border: 1px solid #2a3142; border-radius: 16px; padding: 14px; box-shadow: 0 0 14px rgba(0,0,0,0.25); box-sizing: border-box;">
    <div style="font-size: 11px; color: #8f9bb3; margin-bottom: 10px; letter-spacing: 1px; font-weight: bold;">⚡ ACTIVE EVENT GRID</div>
    <div id="merlion-events-container">
      <div style="background: #0f131d; border: 1px dashed #2a3142; border-radius: 10px; padding: 18px 14px; text-align: center;">
        <div style="font-size: 18px; margin-bottom: 6px;">⏳</div>
        <div style="color: #c9b37e; font-size: 12px; font-weight: bold;">Loading Events...</div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      function showError(containerId, message) {
        var container = document.getElementById(containerId);
        if (container) {
            container.innerHTML = '<div style="background: #0f131d; border: 1px dashed #e85d75; border-radius: 10px; padding: 14px; text-align: center;"><div style="color: #e85d75; font-size: 11px;">' + message + '</div></div>';
        }
      }

      fetch("https://api.chess.com/pub/club/merlion-chess-club/matches")
        .then(function(res){ 
            if (!res.ok) throw new Error("HTTP " + res.status);
            return res.json(); 
        })
        .then(function(data){
            var allMatches = [];
            if(data.registered) allMatches = allMatches.concat(data.registered.map(function(m){ m.displayStatus = "Upcoming"; return m; }));
            if(data.in_progress) allMatches = allMatches.concat(data.in_progress.map(function(m){ m.displayStatus = "Current"; return m; }));
            if(data.finished) allMatches = allMatches.concat(data.finished.map(function(m){ m.displayStatus = "Finished"; return m; }));
            var container = document.getElementById("merlion-events-container");
            if (!container) return;
            if (allMatches.length === 0) {
                container.innerHTML = '<div style="background: #0f131d; border: 1px dashed #2a3142; border-radius: 10px; padding: 18px 14px; text-align: center;"><div style="color: #9aa4b2; font-size: 11px;">No active events right now.</div></div>';
                return;
            }
            container.innerHTML = allMatches.slice(0, 3).map(function(m){
                var url = "#";
                if (m.url) url = m.url;
                else if (m["@id"]) {
                    var matchId = m["@id"].split("/").pop();
                    url = "https://www.chess.com/club/matches/" + matchId;
                }
                var name = m.name || "Club Match";
                return '<div style="background: #0f131d; border-radius: 10px; padding: 10px; margin-bottom: 8px;">' +
                       '<a href="' + url + '" target="_blank" style="color: #c9b37e; font-size: 12px; text-decoration: none; font-weight: bold; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">' + name + '</a>' +
                       '<div style="font-size: 11px; color: #9aa4b2; margin-top: 4px;">Status: ' + m.displayStatus + '</div>' +
                       '</div>';
            }).join("");
        })
        .catch(function(e){
            showError("merlion-events-container", "Events currently unavailable.");
        });
    })();
  </script>
</body>
</html>

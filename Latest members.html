<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merlion Chess Club - Latest Member</title>
</head>
<body style="background: #1b1c1e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: Arial, sans-serif;">

  <!-- LATEST MEMBER WIDGET -->
  <div style="width: 270px; background: #141820; border: 1px solid #2a3142; border-radius: 16px; padding: 14px; box-shadow: 0 0 25px rgba(0,0,0,0.55); box-sizing: border-box;">
    <div style="font-size: 11px; color: #8f9bb3; margin-bottom: 10px; letter-spacing: 1px; font-weight: bold;">📥 LATEST MEMBER</div>
    <div id="merlion-members-container" style="display: flex; flex-direction: column; gap: 8px;">
      <div style="font-size: 11px; color: #9aa4b2; text-align: center;">Loading latest member...</div>
    </div>
  </div>

  <script>
    (function(){
      function showError(containerId, message) {
        var container = document.getElementById(containerId);
        if (container) {
            container.innerHTML = '<div style="background: #0f131d; border: 1px dashed #e85d75; border-radius: 10px; padding: 14px; text-align: center;"><div style="color: #e85d75; font-size: 11px;">' + message + '</div></div>';
        }
      }

      fetch("https://api.chess.com/pub/club/merlion-chess-club/members")
        .then(function(res){ 
            if (!res.ok) throw new Error("HTTP " + res.status);
            return res.json(); 
        })
        .then(function(data){
            var members = [];
            if(data.weekly) members = members.concat(data.weekly);
            if(data.monthly) members = members.concat(data.monthly);
            if(data.all_time) members = members.concat(data.all_time);
            
            members.sort(function(a, b){ return b.joined - a.joined; });
            var top1 = members.slice(0, 1);
            
            var container = document.getElementById("merlion-members-container");
            if (!container) return;
            
            if (top1.length === 0) {
                 container.innerHTML = '<div style="background: #0f131d; border: 1px dashed #2a3142; border-radius: 10px; padding: 14px; text-align: center;"><div style="color: #9aa4b2; font-size: 11px;">No members found.</div></div>';
                 return;
            }

            container.innerHTML = top1.map(function(m){
                var date = new Date(m.joined * 1000).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
                var username = m.username || "ChessFan";
                var userUrl = "https://www.chess.com/member/" + username;
                return '<div style="background: #0f131d; border-left: 3px solid #8cffb0; border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">' +
                         '<div style="font-size: 20px; flex-shrink: 0;">👋</div>' +
                         '<div>' +
                           '<div style="font-size: 10px; color: #8f9bb3; text-transform: uppercase;">Welcome</div>' +
                           '<a href="' + userUrl + '" target="_blank" style="font-size: 12px; color: #eaeaea; font-weight: bold; margin-top: 1px; text-decoration: none; display: inline-block;">' + username + '</a>' +
                           '<div style="font-size: 9px; color: #5a5a5a; margin-top: 3px;">📅 Joined ' + date + '</div>' +
                         '</div>' +
                       '</div>';
            }).join("");
        })
        .catch(function(e){ 
            showError("merlion-members-container", "Members list unavailable.");
        });
    })();
  </script>
</body>
</html>
